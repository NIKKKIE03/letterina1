<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<title>Per te</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
background:#5c94fc;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Press Start 2P', cursive;
overflow:hidden;
}

/* BUSTA PIXEL */

.envelope{
position:relative;
width:220px;
height:150px;
background:#f4c7a1;
border:6px solid black;
cursor:pointer;
}

/* TRIANGOLO SOPRA */

.flap{
position:absolute;
top:-75px;
left:0;
width:0;
height:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-bottom:75px solid #e0a87d;
transform-origin:bottom;
transition:transform 0.8s;
}

.open .flap{
transform:rotateX(180deg);
}

/* LETTERA */

.letter{
position:absolute;
width:190px;
height:120px;
background:white;
border:4px solid black;
left:10px;
top:15px;
padding:10px;
font-size:8px;
line-height:1.6;
transform:translateY(30px);
transition:transform 1s;
overflow:hidden;
}

.open .letter{
transform:translateY(-120px);
}

/* TESTO */

#text{
white-space:pre-wrap;
}

/* CUORI PIXEL */

.heart{
position:absolute;
width:18px;
height:18px;
background:red;
transform:rotate(45deg);
animation:float 5s linear infinite;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:18px;
height:18px;
background:red;
border-radius:50%;
}

.heart:before{
top:-9px;
left:0;
}

.heart:after{
left:-9px;
top:0;
}

@keyframes float{
0%{
transform:translateY(0) rotate(45deg);
opacity:1;
}
100%{
transform:translateY(-700px) rotate(45deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="envelope" id="envelope">

<div class="flap"></div>

<div class="letter">
<div id="text"></div>
</div>

</div>

<audio id="paper">
<source src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3">
</audio>

<script>

let opened=false

const message=`Crescere giorno dopo giorno
assieme a te mi riempie
di gioia,

ti amo alla follia <3`

document.getElementById("envelope").onclick=function(){

if(opened) return
opened=true

this.classList.add("open")

document.getElementById("paper").play()

spawnHearts()

typeWriter()

}

/* CUORI */

function spawnHearts(){

for(let i=0;i<30;i++){

let h=document.createElement("div")
h.className="heart"

h.style.left=Math.random()*100+"vw"
h.style.top="100vh"
h.style.animationDuration=(3+Math.random()*3)+"s"

document.body.appendChild(h)

}

}

/* SCRITTURA TESTO */

let i=0

function typeWriter(){

if(i<message.length){

document.getElementById("text").innerHTML+=message.charAt(i)

i++

setTimeout(typeWriter,60)

}

}

</script>

</body>
</html>
